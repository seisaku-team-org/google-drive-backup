<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4338ca" />
    <meta name="description" content="Google Drive のフォルダを「Copy of …」として同じ親階層に複製する Web アプリ" />

    <!--
      CSP: 技術仕様書 §6.4 の方針に沿った最低限の制限。
      - script-src: 自身 + Google Identity Services（GIS）
      - connect-src: 自身 + Google API
      - frame-src: GIS のポップアップ用
      - style-src: 'unsafe-inline' は CSS Modules の暫定許容（フェーズ I で再評価）
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; connect-src 'self' https://www.googleapis.com https://oauth2.googleapis.com https://accounts.google.com; frame-src https://accounts.google.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'self';"
    />

    <title>Google Drive バックアップ</title>

    <!-- Google Identity Services（GIS）。フェーズ E の AuthClient で利用 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
